name: Build Android APK

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle

    - name: Remove unneeded SDK packages
      run: |
        rm -rf $ANDROID_HOME/system-images || true
        # Keep android-23 (compileSdkVersion 23), remove unneeded higher versions
        find $ANDROID_HOME/platforms -mindepth 1 -maxdepth 1 ! -name 'android-23' -exec rm -rf {} + || true

    - name: Grant execute permission for gradlew
      run: chmod +x R1XiaozhiApp/gradlew

    - name: Build Debug APK
      run: |
        cd R1XiaozhiApp
        ./gradlew assembleDebug --stacktrace

    - name: Build Release APK
      run: |
        cd R1XiaozhiApp
        ./gradlew assembleRelease --stacktrace

    - name: Sign Release APK manually
      run: |
        # Skip if signing secrets are not configured
        if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ] || \
           [ -z "${{ secrets.KEY_ALIAS }}" ] || \
           [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ] || \
           [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
          echo "Signing secrets not configured, skipping signing step."
          exit 0
        fi

        cd R1XiaozhiApp/app/build/outputs/apk/release

        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.jks

        BUILD_TOOLS_DIR=$(ls -1d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)
        echo "Using build tools from: $BUILD_TOOLS_DIR"

        $BUILD_TOOLS_DIR/zipalign -v -p 4 app-release-unsigned.apk app-release-aligned.apk

        $BUILD_TOOLS_DIR/apksigner sign --ks my-release-key.jks \
          --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
          --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
          --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --out app-release-signed.apk \
          app-release-aligned.apk

        rm -f my-release-key.jks app-release-aligned.apk

    - name: Get version info
      id: version
      run: |
        cd R1XiaozhiApp
        VERSION_NAME=$(grep "versionName" app/build.gradle | awk -F'"' '{print $2}')
        VERSION_CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}')
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "Version: $VERSION_NAME (Code: $VERSION_CODE)"

    - name: Rename APKs
      run: |
        cd R1XiaozhiApp/app/build/outputs/apk
        if [ -f "debug/app-debug.apk" ]; then
          mv debug/app-debug.apk debug/R1Xiaozhi-v${{ steps.version.outputs.version_name }}-debug.apk
        fi
        SIGNED_APK=$(find release -name "*signed.apk" -o -name "app-release.apk" | head -n 1)
        if [ -n "$SIGNED_APK" ]; then
          mv "$SIGNED_APK" release/R1Xiaozhi-v${{ steps.version.outputs.version_name }}-release.apk
        fi
        rm -f release/*unsigned*.apk || true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: R1Xiaozhi-Debug-APK
        path: R1XiaozhiApp/app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: R1Xiaozhi-Release-APK
        path: R1XiaozhiApp/app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: Generate checksum
      run: |
        cd R1XiaozhiApp/app/build/outputs/apk/release
        if ls *.apk 1>/dev/null 2>&1; then
          sha256sum *.apk > checksums.txt
          cat checksums.txt
        else
          echo "No APK files found, skipping checksum"
          touch checksums.txt
        fi

    - name: Upload checksum
      uses: actions/upload-artifact@v4
      with:
        name: Checksums
        path: R1XiaozhiApp/app/build/outputs/apk/release/checksums.txt

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: R1Xiaozhi-Release-APK
        path: release-apk

    - name: Download Checksums
      uses: actions/download-artifact@v4
      with:
        name: Checksums
        path: checksums

    - name: Get version from tag
      id: tag_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.tag_version.outputs.version }}
        body: |
          ## Xiaozhi Voice Assistant for Phicomm R1

          ### Version: ${{ steps.tag_version.outputs.version }}

          ### Download
          - **Release APK**: Production-ready build, optimized and minified.
          - **Checksums**: SHA-256 file hashes to verify data integrity.

          ### Quick Start
          ```bash
          adb install -r R1Xiaozhi-v${{ steps.tag_version.outputs.version }}-release.apk
          ```

          ### Documentation
          See [INSTALLATION_GUIDE.md](https://github.com/${{ github.repository }}/blob/main/docs/INSTALLATION_GUIDE.md)
        files: |
          release-apk/*.apk
          checksums/checksums.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Build Status Notification
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Build Success
      if: needs.build.result == 'success'
      run: |
        echo "Build completed successfully!"
        echo "APK artifacts are available in the Actions tab"

    - name: Build Failed
      if: needs.build.result == 'failure'
      run: |
        echo "Build failed! Check the logs for details"
        exit 1
